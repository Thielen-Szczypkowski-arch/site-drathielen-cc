<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <meta name="theme-color" content="#ac9273">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página não encontrada | Dra. Thielen Szczypkowski</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream-light);
      padding: 40px 24px;
    }
    .error-inner {
      text-align: center;
      max-width: 520px;
    }
    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 700;
      color: var(--bronze);
      line-height: 1;
      letter-spacing: -0.04em;
      opacity: 0.18;
      margin-bottom: -20px;
      display: block;
    }
    .error-inner h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 16px;
    }
    .error-inner p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.75;
      margin-bottom: 36px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<header id="header" class="header-dark scrolled">
  <div class="container">
    <div class="header-inner">
      <a href="/" class="logo">
        <img src="/assets/logo-original.png" alt="Dra. Thielen Szczypkowski — Cirurgia Vascular · Flebologia" class="logo-img">
      </a>
      <nav>
        <a href="/sobre">Sobre</a>
        <a href="/tratamentos">Tratamentos</a>
        <a href="/blog/">Blog</a>
        <a href="/contato">Contato</a>
        <a href="/contato" class="nav-cta">Agendar consulta</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" id="mobileClose">&#x2715;</button>
  <a href="/sobre">Sobre</a>
  <a href="/tratamentos">Tratamentos</a>
  <a href="/blog/">Blog</a>
  <a href="/contato">Contato</a>
  <a href="/contato" class="nav-cta">Agendar consulta</a>
</div>

<main class="error-page">
  <div class="error-inner">
    <span class="error-code">404</span>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido.<br>Volte para o início e encontre o que precisa.</p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">Ir para o início</a>
      <a href="/contato" class="btn btn-outline">Falar pelo WhatsApp</a>
    </div>
  </div>
</main>

<script src="/js/main.js"></script>
</body>
</html>
