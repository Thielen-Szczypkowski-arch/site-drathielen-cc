<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Autenticando… — Blog Dra. Thielen</title>
  <style>
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 500; font-display:swap; src:url('/assets/fonts/inter-latin.woff2') format('woff2') }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
    :root { --bronze:#ac9273; --brown:#524334; --cream-light:#f9f7f4; --white:#fff; --text-dark:#2a1f14; --text-muted:#7a6a5a }
    body { font-family:'Inter',sans-serif; background:var(--cream-light); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px }
    .card { background:var(--white); border-radius:24px; padding:44px; max-width:380px; width:100%; text-align:center; box-shadow:0 8px 32px rgba(82,67,52,0.09); border:1px solid rgba(172,146,115,0.14) }
    .spinner { width:36px; height:36px; border:3px solid rgba(172,146,115,0.2); border-top-color:var(--bronze); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px }
    @keyframes spin { to { transform:rotate(360deg) } }
    h2 { font-family:'Inter',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:8px }
    p { font-size:0.82rem; color:var(--text-muted); line-height:1.6 }
    .error { color:#c0392b; font-size:0.82rem; margin-top:12px; display:none }
    .error.visible { display:block }
    .btn-back { display:inline-block; margin-top:20px; padding:10px 24px; background:var(--brown); color:#fff; border-radius:100px; font-size:0.82rem; font-weight:600; text-decoration:none; transition:background 0.2s }
    .btn-back:hover { background:#3d3025 }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h2 id="msg">Autenticando com GitHub…</h2>
    <p id="sub">Aguarde, isso leva apenas alguns segundos.</p>
    <div class="error" id="errorMsg"></div>
    <a href="/admin/" class="btn-back" id="btnBack" style="display:none">Voltar ao login</a>
  </div>

  <script>
    // ─── CONFIGURAÇÃO ───────────────────────────────────────────────
    // Mesmo Client ID do index.html — cole aqui também:
    var GITHUB_CLIENT_ID = 'SEU_CLIENT_ID_AQUI';
    // Client Secret NÃO pode ficar no frontend — use o proxy abaixo.
    // Proxy gratuito para trocar code por token (Cloudflare Worker):
    var TOKEN_PROXY_URL = 'SEU_PROXY_URL_AQUI';
    // ────────────────────────────────────────────────────────────────

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').textContent = 'Erro na autenticação';
      document.getElementById('sub').textContent = '';
      var err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.classList.add('visible');
      document.getElementById('btnBack').style.display = 'inline-block';
    }

    (function () {
      var params = new URLSearchParams(window.location.search);
      var code  = params.get('code');
      var state = params.get('state');
      var saved = sessionStorage.getItem('oauth_state');

      if (!code) { showError('Código de autorização não encontrado.'); return; }
      if (state !== saved) { showError('Estado inválido. Tente novamente.'); return; }
      sessionStorage.removeItem('oauth_state');

      if (TOKEN_PROXY_URL === 'SEU_PROXY_URL_AQUI') {
        showError('Proxy de autenticação não configurado. Consulte a documentação.');
        return;
      }

      // Troca o code pelo token via proxy
      fetch(TOKEN_PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, state: state })
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.access_token) {
          sessionStorage.setItem('gh_token', data.access_token);
          window.location.href = '/admin/editor.html';
        } else {
          showError('Token não recebido: ' + (data.error_description || data.error || 'erro desconhecido'));
        }
      })
      .catch(function (err) {
        showError('Falha na conexão com o proxy: ' + err.message);
      });
    })();
  </script>
</body>
</html>
