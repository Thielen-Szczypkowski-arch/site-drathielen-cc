<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Blog Dra. Thielen</title>
  <style>
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 500; font-display:swap; src:url('/assets/fonts/inter-latin.woff2') format('woff2') }
    @font-face { font-family:'Outfit'; font-style:normal; font-weight:400 700; font-display:swap; src:url('/assets/fonts/outfit-latin.woff2') format('woff2') }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
    :root {
      --bronze:#ac9273; --bronze-dark:#8a7358; --bronze-light:#c4ab8e;
      --bronze-pale:rgba(172,146,115,0.12); --brown:#524334;
      --cream:#f4f0eb; --cream-light:#f9f7f4; --white:#ffffff;
      --text-dark:#2a1f14; --text-muted:#7a6a5a; --text-light:#a89880;
      --radius-pill:100px; --shadow-md:0 8px 28px rgba(82,67,52,0.08);
    }
    html, body { height:100%; font-family:'Inter',sans-serif; background:var(--cream-light); color:var(--text-dark) }
    body {
      display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
      background-image:
        radial-gradient(ellipse at 80% 15%, rgba(172,146,115,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 85%, rgba(172,146,115,0.08) 0%, transparent 55%);
    }
    .card {
      background:var(--white); border-radius:28px; padding:52px 44px 44px;
      width:100%; max-width:420px; text-align:center;
      box-shadow:0 12px 48px rgba(82,67,52,0.10), 0 1px 0 rgba(172,146,115,0.18);
      border:1px solid rgba(172,146,115,0.14);
    }
    .logo { height:68px; width:auto; display:block; margin:0 auto 28px }
    .divider { width:36px; height:2px; background:var(--bronze-pale); margin:0 auto 24px; border-radius:2px }
    h1 { font-family:'Outfit',sans-serif; font-size:1.3rem; font-weight:700; color:var(--text-dark); margin-bottom:8px; letter-spacing:-0.01em }
    .sub { font-size:0.82rem; color:var(--text-muted); line-height:1.65; margin-bottom:32px }
    .btn-github {
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:14px 28px; background:var(--brown); color:var(--white);
      border:none; border-radius:var(--radius-pill); font-family:'Inter',sans-serif;
      font-size:0.88rem; font-weight:600; cursor:pointer; text-decoration:none;
      transition:background 0.2s, transform 0.2s, box-shadow 0.2s; letter-spacing:0.02em;
    }
    .btn-github:hover { background:#3d3025; transform:translateY(-2px); box-shadow:0 8px 20px rgba(82,67,52,0.18) }
    .btn-github:active { transform:scale(0.97) }
    .btn-github svg { width:18px; height:18px; flex-shrink:0 }
    .badge {
      display:inline-flex; align-items:center; gap:8px; margin-top:28px;
      font-size:0.67rem; color:var(--text-light); letter-spacing:0.08em; text-transform:uppercase; font-weight:500;
    }
    .badge::before, .badge::after { content:''; display:block; width:22px; height:1px; background:rgba(172,146,115,0.25) }
    .error-msg { display:none; margin-top:16px; padding:10px 16px; background:#fff0f0; border-radius:10px; font-size:0.8rem; color:#c0392b }
    .error-msg.visible { display:block }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo-original.webp" alt="Dra. Thielen Szczypkowski" class="logo" width="529" height="226">
    <div class="divider"></div>
    <h1>Área restrita</h1>
    <p class="sub">Painel de publicação do blog.<br>Acesso exclusivo à equipe da clínica.</p>
    <a href="#" class="btn-github" id="loginBtn">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Entrar com GitHub
    </a>
    <div class="error-msg" id="errorMsg">Configuração pendente. Insira o Client ID do OAuth App.</div>
    <div class="badge">Blog · Dra. Thielen Szczypkowski</div>
  </div>

  <script>
    // ─── CONFIGURAÇÃO ───────────────────────────────────────────────
    // Após criar o OAuth App no GitHub, cole o Client ID aqui:
    var GITHUB_CLIENT_ID = 'SEU_CLIENT_ID_AQUI';
    var REPO = 'Thielen-Szczypkowski-arch/site-drathielen-cc';
    var CALLBACK_URL = 'https://www.drathielen.com.br/admin/auth.html';
    // ────────────────────────────────────────────────────────────────

    // Se já está logado, vai direto para o editor
    if (sessionStorage.getItem('gh_token')) {
      window.location.href = '/admin/editor.html';
    }

    document.getElementById('loginBtn').addEventListener('click', function (e) {
      e.preventDefault();
      if (GITHUB_CLIENT_ID === 'SEU_CLIENT_ID_AQUI') {
        document.getElementById('errorMsg').classList.add('visible');
        return;
      }
      var state = Math.random().toString(36).slice(2);
      sessionStorage.setItem('oauth_state', state);
      var url = 'https://github.com/login/oauth/authorize'
        + '?client_id=' + GITHUB_CLIENT_ID
        + '&scope=repo'
        + '&state=' + state
        + '&redirect_uri=' + encodeURIComponent(CALLBACK_URL);
      window.location.href = url;
    });
  </script>
</body>
</html>
