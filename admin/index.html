<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Blog Dra. Thielen</title>
  <style>
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 500; font-display:swap; src:url('/assets/fonts/inter-latin.woff2') format('woff2') }
    @font-face { font-family:'Outfit'; font-style:normal; font-weight:400 700; font-display:swap; src:url('/assets/fonts/outfit-latin.woff2') format('woff2') }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
    :root {
      --bronze:#ac9273; --bronze-dark:#8a7358; --bronze-light:#c4ab8e;
      --bronze-pale:rgba(172,146,115,0.12); --brown:#524334;
      --cream:#f4f0eb; --cream-light:#f9f7f4; --white:#ffffff;
      --text-dark:#2a1f14; --text-muted:#7a6a5a; --text-light:#a89880;
      --radius-sm:12px; --radius-pill:100px;
    }
    html, body { height:100%; font-family:'Inter',sans-serif; background:var(--cream-light); color:var(--text-dark) }
    body {
      display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
      background-image:
        radial-gradient(ellipse at 80% 15%, rgba(172,146,115,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 85%, rgba(172,146,115,0.08) 0%, transparent 55%);
    }
    .card {
      background:var(--white); border-radius:28px; padding:52px 44px 44px;
      width:100%; max-width:420px; text-align:center;
      box-shadow:0 12px 48px rgba(82,67,52,0.10), 0 1px 0 rgba(172,146,115,0.18);
      border:1px solid rgba(172,146,115,0.14);
    }
    .logo { height:68px; width:auto; display:block; margin:0 auto 28px }
    .divider { width:36px; height:2px; background:var(--bronze-pale); margin:0 auto 24px; border-radius:2px }
    h1 { font-family:'Outfit',sans-serif; font-size:1.3rem; font-weight:700; color:var(--text-dark); margin-bottom:8px; letter-spacing:-0.01em }
    .sub { font-size:0.82rem; color:var(--text-muted); line-height:1.65; margin-bottom:28px }
    .field { display:flex; flex-direction:column; gap:6px; text-align:left; margin-bottom:16px }
    .field label { font-size:0.72rem; font-weight:600; color:var(--text-muted); letter-spacing:0.05em; text-transform:uppercase }
    .field input {
      padding:11px 14px; border:1.5px solid rgba(172,146,115,0.25);
      border-radius:var(--radius-sm); font-family:'Inter',sans-serif;
      font-size:0.88rem; color:var(--text-dark); background:var(--white);
      transition:border-color 0.2s, box-shadow 0.2s; outline:none;
    }
    .field input:focus { border-color:var(--bronze); box-shadow:0 0 0 3px rgba(172,146,115,0.12) }
    .btn-entrar {
      display:inline-flex; align-items:center; justify-content:center;
      width:100%; padding:14px 28px; background:var(--brown); color:var(--white);
      border:none; border-radius:var(--radius-pill); font-family:'Inter',sans-serif;
      font-size:0.88rem; font-weight:600; cursor:pointer;
      transition:background 0.2s, transform 0.2s, box-shadow 0.2s; letter-spacing:0.02em;
    }
    .btn-entrar:hover { background:#3d3025; transform:translateY(-2px); box-shadow:0 8px 20px rgba(82,67,52,0.18) }
    .btn-entrar:active { transform:scale(0.97) }
    .error-msg { display:none; margin-top:14px; padding:10px 16px; background:#fff0f0; border-radius:10px; font-size:0.8rem; color:#c0392b; text-align:center }
    .error-msg.visible { display:block }
    .badge {
      display:inline-flex; align-items:center; gap:8px; margin-top:24px;
      font-size:0.67rem; color:var(--text-light); letter-spacing:0.08em; text-transform:uppercase; font-weight:500;
    }
    .badge::before, .badge::after { content:''; display:block; width:22px; height:1px; background:rgba(172,146,115,0.25) }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo-original.webp" alt="Dra. Thielen Szczypkowski" class="logo" width="529" height="226">
    <div class="divider"></div>
    <h1>Área restrita</h1>
    <p class="sub">Painel de publicação do blog.<br>Acesso exclusivo à equipe da clínica.</p>

    <div class="field">
      <label for="tokenInput">Senha de acesso</label>
      <input type="password" id="tokenInput" placeholder="Cole a senha aqui" autocomplete="current-password">
    </div>

    <button class="btn-entrar" id="btnEntrar">Entrar</button>
    <div class="error-msg" id="errorMsg">Senha incorreta. Tente novamente.</div>
    <div class="badge">Blog · Dra. Thielen Szczypkowski</div>
  </div>

  <script>
    // Se já está autenticado, vai direto para o editor
    if (sessionStorage.getItem('gh_token')) {
      window.location.href = '/admin/editor.html';
    }

    function tryLogin() {
      var val = document.getElementById('tokenInput').value.trim();
      if (!val) return;
      // Verifica o token na API do GitHub
      fetch('https://api.github.com/repos/Thielen-Szczypkowski-arch/site-drathielen-cc', {
        headers: { 'Authorization': 'token ' + val }
      }).then(function(r) {
        if (r.ok) {
          sessionStorage.setItem('gh_token', val);
          window.location.href = '/admin/editor.html';
        } else {
          document.getElementById('errorMsg').classList.add('visible');
        }
      }).catch(function() {
        document.getElementById('errorMsg').classList.add('visible');
      });
    }

    document.getElementById('btnEntrar').addEventListener('click', tryLogin);
    document.getElementById('tokenInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') tryLogin();
    });
  </script>
</body>
</html>
