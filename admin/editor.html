<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Editor — Blog Dra. Thielen</title>
  <style>
    @font-face { font-family:'Inter'; font-style:normal; font-weight:400 500; font-display:swap; src:url('/assets/fonts/inter-latin.woff2') format('woff2') }
    @font-face { font-family:'Outfit'; font-style:normal; font-weight:400 700; font-display:swap; src:url('/assets/fonts/outfit-latin.woff2') format('woff2') }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
    :root {
      --bronze:#ac9273; --bronze-dark:#8a7358; --bronze-light:#c4ab8e;
      --bronze-pale:rgba(172,146,115,0.12); --brown:#524334;
      --cream:#f4f0eb; --cream-light:#f9f7f4; --white:#fff;
      --text-dark:#2a1f14; --text-muted:#7a6a5a; --text-light:#a89880;
      --radius-sm:12px; --radius-md:20px; --radius-pill:100px;
      --shadow-sm:0 2px 10px rgba(82,67,52,0.05);
      --shadow-md:0 8px 28px rgba(82,67,52,0.08);
    }
    html, body { height:100%; font-family:'Inter',sans-serif; background:var(--cream-light); color:var(--text-dark) }

    /* HEADER */
    .admin-header {
      position:fixed; top:0; left:0; right:0; z-index:100;
      background:var(--brown); height:60px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 28px; box-shadow:0 2px 12px rgba(0,0,0,0.12);
    }
    .admin-header .logo { height:36px; width:auto; display:block }
    .header-right { display:flex; align-items:center; gap:12px }
    .btn-new {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 18px; background:var(--bronze); color:var(--white);
      border:none; border-radius:var(--radius-pill); font-family:'Inter',sans-serif;
      font-size:0.78rem; font-weight:600; cursor:pointer; transition:background 0.2s;
    }
    .btn-new:hover { background:var(--bronze-dark) }
    .btn-logout {
      padding:8px 16px; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.7);
      border:1px solid rgba(255,255,255,0.2); border-radius:var(--radius-pill);
      font-family:'Inter',sans-serif; font-size:0.75rem; cursor:pointer; transition:all 0.2s;
    }
    .btn-logout:hover { background:rgba(255,255,255,0.18); color:#fff }

    /* LAYOUT */
    .admin-body { padding-top:60px; min-height:100vh }
    .admin-wrap { max-width:900px; margin:0 auto; padding:40px 24px }

    /* LISTA */
    #view-list { display:block }
    #view-editor { display:none }
    .view-title { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:700; margin-bottom:6px }
    .view-sub { font-size:0.82rem; color:var(--text-muted); margin-bottom:32px }
    .posts-list { display:flex; flex-direction:column; gap:10px }
    .post-item {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--white); border-radius:var(--radius-sm); padding:16px 20px;
      border:1px solid rgba(172,146,115,0.12); box-shadow:var(--shadow-sm);
      transition:box-shadow 0.2s;
    }
    .post-item:hover { box-shadow:var(--shadow-md) }
    .post-item-info { flex:1; min-width:0 }
    .post-item-title { font-size:0.9rem; font-weight:600; color:var(--text-dark); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
    .post-item-meta { font-size:0.72rem; color:var(--text-light) }
    .post-item-tag { display:inline-block; padding:2px 8px; background:var(--bronze-pale); color:var(--bronze); border-radius:100px; font-size:0.65rem; font-weight:600; margin-left:8px }
    .post-item-actions { display:flex; gap:8px; flex-shrink:0; margin-left:16px }
    .btn-edit {
      padding:6px 14px; background:var(--bronze-pale); color:var(--bronze);
      border:none; border-radius:var(--radius-pill); font-size:0.75rem; font-weight:600;
      cursor:pointer; transition:background 0.2s;
    }
    .btn-edit:hover { background:rgba(172,146,115,0.22) }
    .btn-delete {
      padding:6px 12px; background:transparent; color:var(--text-light);
      border:1px solid rgba(172,146,115,0.2); border-radius:var(--radius-pill);
      font-size:0.75rem; cursor:pointer; transition:all 0.2s;
    }
    .btn-delete:hover { background:#fff0f0; color:#c0392b; border-color:#f5c6cb }
    .empty-state { text-align:center; padding:60px 24px; color:var(--text-muted) }
    .empty-state p { font-size:0.9rem; margin-top:12px }

    /* FORMULÁRIO */
    .editor-header { display:flex; align-items:center; gap:12px; margin-bottom:32px }
    .btn-back-list {
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 16px; background:transparent; color:var(--text-muted);
      border:1px solid rgba(172,146,115,0.25); border-radius:var(--radius-pill);
      font-size:0.78rem; font-weight:500; cursor:pointer; transition:all 0.2s;
    }
    .btn-back-list:hover { border-color:var(--bronze); color:var(--bronze) }
    .editor-title { font-family:'Outfit',sans-serif; font-size:1.4rem; font-weight:700 }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px }
    .form-full { grid-column:1/-1 }
    .field { display:flex; flex-direction:column; gap:6px }
    .field label { font-size:0.75rem; font-weight:600; color:var(--text-muted); letter-spacing:0.04em; text-transform:uppercase }
    .field input, .field select, .field textarea {
      padding:11px 14px; border:1.5px solid rgba(172,146,115,0.25);
      border-radius:var(--radius-sm); font-family:'Inter',sans-serif;
      font-size:0.88rem; color:var(--text-dark); background:var(--white);
      transition:border-color 0.2s, box-shadow 0.2s; outline:none;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color:var(--bronze); box-shadow:0 0 0 3px rgba(172,146,115,0.12);
    }
    .field textarea { resize:vertical; min-height:80px; line-height:1.6 }
    .field .hint { font-size:0.72rem; color:var(--text-light); margin-top:2px }

    /* Upload */
    .img-upload-area {
      border:2px dashed rgba(172,146,115,0.3); border-radius:var(--radius-sm);
      padding:24px; text-align:center; cursor:pointer;
      transition:border-color 0.2s, background 0.2s; background:var(--cream-light);
    }
    .img-upload-area:hover { border-color:var(--bronze); background:var(--cream) }
    .img-upload-area.has-image { padding:0; overflow:hidden; border-style:solid; border-color:rgba(172,146,115,0.3) }
    .img-preview { width:100%; height:180px; object-fit:cover; display:block; border-radius:10px }
    .img-change-btn {
      display:block; width:100%; padding:8px; background:rgba(0,0,0,0.45);
      color:#fff; font-size:0.75rem; font-weight:600; text-align:center;
      cursor:pointer; border:none; font-family:'Inter',sans-serif;
    }
    .img-upload-placeholder { pointer-events:none }
    .img-upload-icon { width:32px; height:32px; color:var(--bronze-light); margin:0 auto 10px; display:block }
    .img-upload-text { font-size:0.8rem; color:var(--text-muted) }
    .img-upload-text strong { color:var(--bronze); font-weight:600 }
    #imgInput { display:none }

    /* Editor rico */
    .rich-toolbar {
      display:flex; gap:4px; padding:8px 10px; background:var(--cream);
      border:1.5px solid rgba(172,146,115,0.25); border-bottom:none;
      border-radius:var(--radius-sm) var(--radius-sm) 0 0; flex-wrap:wrap;
    }
    .rich-toolbar button {
      padding:5px 10px; border:none; background:transparent; border-radius:8px;
      font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:600;
      color:var(--text-muted); cursor:pointer; transition:background 0.15s, color 0.15s; min-width:32px;
    }
    .rich-toolbar button:hover { background:rgba(172,146,115,0.15); color:var(--bronze) }
    .rich-toolbar .sep { width:1px; background:rgba(172,146,115,0.2); margin:4px; align-self:stretch }
    .rich-editor {
      min-height:280px; padding:16px;
      border:1.5px solid rgba(172,146,115,0.25);
      border-radius:0 0 var(--radius-sm) var(--radius-sm);
      font-family:'Inter',sans-serif; font-size:0.9rem; line-height:1.8;
      color:var(--text-dark); background:var(--white); outline:none; overflow-y:auto;
    }
    .rich-editor:focus { border-color:var(--bronze); box-shadow:0 0 0 3px rgba(172,146,115,0.12) }
    .rich-editor h2 { font-family:'Outfit',sans-serif; font-size:1.3rem; margin:20px 0 8px }
    .rich-editor h3 { font-family:'Inter',sans-serif; font-size:1.05rem; font-weight:600; margin:16px 0 6px }
    .rich-editor p { margin-bottom:12px }
    .rich-editor ul { padding-left:20px; margin-bottom:12px }
    .rich-editor li { margin-bottom:4px }
    .rich-editor blockquote { border-left:3px solid var(--bronze); padding:10px 16px; margin:16px 0; background:var(--cream-light); border-radius:0 8px 8px 0; font-style:italic }
    .section-sep { grid-column:1/-1; border:none; border-top:1px solid rgba(172,146,115,0.15); margin:8px 0 4px }
    .section-label-row { grid-column:1/-1; font-size:0.7rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--bronze) }

    /* Taxonomias */
    .tax-box {
      border:1.5px solid rgba(172,146,115,0.25); border-radius:var(--radius-sm);
      padding:12px 14px; background:var(--white); display:flex; flex-wrap:wrap; gap:8px; min-height:44px;
    }
    .tax-chip {
      display:inline-flex; align-items:center; gap:5px;
      padding:4px 10px 4px 12px; border-radius:100px;
      font-size:0.75rem; font-weight:500; cursor:default; user-select:none;
    }
    .tax-chip.cat { background:var(--bronze); color:#fff }
    .tax-chip.tag { background:var(--bronze-pale); color:var(--bronze); border:1px solid rgba(172,146,115,0.3) }
    .tax-chip.tag.selected { background:var(--bronze); color:#fff }
    .tax-chip button {
      background:none; border:none; cursor:pointer; padding:0; line-height:1;
      color:inherit; opacity:0.7; font-size:0.85rem; display:flex; align-items:center;
    }
    .tax-chip button:hover { opacity:1 }
    .tax-dropdown {
      position:relative; display:inline-block;
    }
    .tax-dropdown-menu {
      display:none; position:absolute; top:calc(100% + 6px); left:0; z-index:50;
      background:var(--white); border:1.5px solid rgba(172,146,115,0.2);
      border-radius:var(--radius-sm); box-shadow:var(--shadow-md);
      min-width:200px; padding:6px 0; max-height:220px; overflow-y:auto;
    }
    .tax-dropdown-menu.open { display:block }
    .tax-dropdown-item {
      padding:8px 14px; font-size:0.82rem; color:var(--text-dark); cursor:pointer;
      transition:background 0.15s; display:flex; align-items:center; gap:8px;
    }
    .tax-dropdown-item:hover { background:var(--cream-light) }
    .tax-dropdown-item.selected { color:var(--bronze); font-weight:600 }
    .tax-dropdown-item.selected::before { content:'✓'; font-size:0.75rem }
    .tax-dropdown-item:not(.selected)::before { content:''; width:0.75rem; display:inline-block }
    .tax-new-row { padding:6px 8px; border-top:1px solid rgba(172,146,115,0.1); display:flex; gap:6px }
    .tax-new-input {
      flex:1; padding:6px 10px; border:1.5px solid rgba(172,146,115,0.25);
      border-radius:8px; font-size:0.8rem; font-family:'Inter',sans-serif; outline:none; color:var(--text-dark);
    }
    .tax-new-input:focus { border-color:var(--bronze) }
    .tax-new-btn {
      padding:6px 12px; background:var(--bronze); color:#fff; border:none;
      border-radius:8px; font-size:0.78rem; font-weight:600; cursor:pointer; white-space:nowrap;
    }
    .tax-new-btn:hover { background:var(--bronze-dark) }
    .btn-tax-open {
      display:inline-flex; align-items:center; gap:6px; padding:4px 12px 4px 10px;
      border:1.5px dashed rgba(172,146,115,0.4); border-radius:100px;
      font-size:0.75rem; color:var(--bronze); background:none; cursor:pointer; font-family:'Inter',sans-serif;
      transition:border-color 0.2s, background 0.2s;
    }
    .btn-tax-open:hover { border-color:var(--bronze); background:var(--bronze-pale) }
    .btn-manage-tax {
      display:inline-flex; align-items:center; gap:5px; font-size:0.72rem;
      color:var(--text-light); background:none; border:none; cursor:pointer;
      font-family:'Inter',sans-serif; padding:2px 0; text-decoration:underline; text-underline-offset:2px;
    }
    .btn-manage-tax:hover { color:var(--bronze) }
    .form-actions { grid-column:1/-1; display:flex; gap:12px; justify-content:flex-end; padding-top:8px }
    .btn-save {
      padding:13px 36px; background:var(--bronze); color:var(--white);
      border:none; border-radius:var(--radius-pill); font-family:'Inter',sans-serif;
      font-size:0.88rem; font-weight:600; cursor:pointer; transition:background 0.2s, transform 0.2s;
    }
    .btn-save:hover { background:var(--bronze-dark); transform:translateY(-1px) }
    .btn-save:disabled { opacity:0.6; cursor:not-allowed; transform:none }
    .btn-cancel {
      padding:13px 28px; background:transparent; color:var(--text-muted);
      border:1.5px solid rgba(172,146,115,0.25); border-radius:var(--radius-pill);
      font-family:'Inter',sans-serif; font-size:0.88rem; cursor:pointer; transition:all 0.2s;
    }
    .btn-cancel:hover { border-color:var(--bronze); color:var(--bronze) }

    /* SEO Panel */
    .seo-panel {
      grid-column:1/-1; background:var(--white);
      border:1.5px solid rgba(172,146,115,0.2); border-radius:var(--radius-sm);
      padding:20px 24px; margin-bottom:4px;
    }
    .seo-panel-header {
      display:flex; align-items:center; gap:14px; margin-bottom:16px;
    }
    .seo-score-ring {
      position:relative; width:64px; height:64px; flex-shrink:0;
    }
    .seo-score-ring svg { transform:rotate(-90deg) }
    .seo-score-ring circle { fill:none; stroke-width:5; stroke-linecap:round }
    .seo-score-ring .ring-bg { stroke:rgba(172,146,115,0.15) }
    .seo-score-ring .ring-fill { transition:stroke-dashoffset 0.5s, stroke 0.5s }
    .seo-score-num {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:700; color:var(--text-dark);
    }
    .seo-panel-info { flex:1 }
    .seo-panel-title { font-size:0.78rem; font-weight:700; color:var(--text-dark); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.05em }
    .seo-panel-status { font-size:0.75rem; color:var(--text-muted) }
    .seo-kw-row { display:flex; gap:8px; align-items:center; margin-bottom:14px }
    .seo-kw-input {
      flex:1; padding:8px 12px; border:1.5px solid rgba(172,146,115,0.3);
      border-radius:10px; font-size:0.82rem; font-family:'Inter',sans-serif;
      color:var(--text-dark); outline:none; background:var(--cream-light);
    }
    .seo-kw-input:focus { border-color:var(--bronze); background:var(--white) }
    .seo-kw-label { font-size:0.72rem; font-weight:600; color:var(--text-muted); white-space:nowrap; text-transform:uppercase; letter-spacing:0.04em }
    .seo-tabs { display:flex; gap:0; margin-bottom:14px; border-bottom:2px solid rgba(172,146,115,0.15) }
    .seo-tab {
      padding:6px 16px; font-size:0.75rem; font-weight:600; cursor:pointer;
      border:none; background:none; font-family:'Inter',sans-serif;
      color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-2px; transition:color 0.2s;
    }
    .seo-tab.active { color:var(--bronze); border-bottom-color:var(--bronze) }
    .seo-tab-pane { display:none }
    .seo-tab-pane.active { display:block }
    .seo-items { display:flex; flex-direction:column; gap:6px }
    .seo-item {
      display:flex; align-items:flex-start; gap:10px;
      padding:8px 12px; border-radius:10px; font-size:0.75rem; line-height:1.4;
    }
    .seo-item.ok   { background:rgba(34,197,94,0.07);  color:#166534 }
    .seo-item.warn { background:rgba(234,179,8,0.09);  color:#854d0e }
    .seo-item.bad  { background:rgba(239,68,68,0.07);  color:#991b1b }
    .seo-item-dot {
      width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:3px;
    }
    .seo-item.ok   .seo-item-dot { background:#22c55e }
    .seo-item.warn .seo-item-dot { background:#eab308 }
    .seo-item.bad  .seo-item-dot { background:#ef4444 }
    .seo-item-body { flex:1 }
    .seo-item-title { font-weight:600; margin-bottom:1px }
    .seo-item-desc { font-size:0.7rem; opacity:0.8; margin-top:2px }

    /* Toast */
    .toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--brown); color:#fff; padding:12px 24px; border-radius:var(--radius-pill);
      font-size:0.84rem; font-weight:500; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0) }
    .toast.error { background:#c0392b }

    /* Loading */
    .loading-overlay {
      display:none; position:fixed; inset:0; background:rgba(249,247,244,0.85);
      backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:16px;
    }
    .loading-overlay.show { display:flex }
    .spinner { width:40px; height:40px; border:3px solid rgba(172,146,115,0.2); border-top-color:var(--bronze); border-radius:50%; animation:spin 0.8s linear infinite }
    @keyframes spin { to { transform:rotate(360deg) } }
    .loading-text { font-size:0.88rem; color:var(--text-muted); font-weight:500 }

    @media (max-width:640px) {
      .form-grid { grid-template-columns:1fr }
      .form-full, .section-sep, .section-label-row, .form-actions { grid-column:1 }
      .admin-wrap { padding:28px 16px }
    }
  </style>
</head>
<body>

<header class="admin-header">
  <img src="/assets/logo-branco.webp" alt="Dra. Thielen" class="logo" width="529" height="226">
  <div class="header-right">
    <button class="btn-new" id="btnNewPost">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo post
    </button>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</header>

<div class="admin-body">
  <div class="admin-wrap">

    <!-- LISTA -->
    <div id="view-list">
      <h1 class="view-title">Posts do blog</h1>
      <p class="view-sub" id="postsCount">Carregando…</p>
      <div class="posts-list" id="postsList"></div>
    </div>

    <!-- EDITOR -->
    <div id="view-editor">
      <div class="editor-header">
        <button class="btn-back-list" id="btnBackList">← Voltar</button>
        <h2 class="editor-title" id="editorTitle">Novo post</h2>
      </div>

      <div class="form-grid">
        <div class="field form-full">
          <label for="fTitle">Título do post *</label>
          <input type="text" id="fTitle" placeholder="Ex: Como prevenir varizes no verão">
        </div>
        <div class="field">
          <label for="fDate">Data de publicação *</label>
          <input type="date" id="fDate">
        </div>
        <div class="field">
          <label>Categoria *</label>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <div class="tax-dropdown" id="catDropdown">
              <button type="button" class="btn-tax-open" id="btnOpenCat">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Escolher categoria
              </button>
              <div class="tax-dropdown-menu" id="catMenu"></div>
            </div>
            <span id="catSelected" style="font-size:0.82rem;color:var(--text-muted)"></span>
          </div>
          <input type="hidden" id="fCategory">
        </div>
        <div class="field form-full">
          <label>Tags</label>
          <div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">
            <div id="tagsSelected" style="display:flex;flex-wrap:wrap;gap:6px;align-items:center"></div>
            <div class="tax-dropdown" id="tagDropdown">
              <button type="button" class="btn-tax-open" id="btnOpenTag">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Adicionar tag
              </button>
              <div class="tax-dropdown-menu" id="tagMenu"></div>
            </div>
          </div>
          <button type="button" class="btn-manage-tax" onclick="window.open('/admin/taxonomias.html','_blank')">⚙ Gerenciar categorias e tags</button>
        </div>
        <div class="field form-full">
          <label for="fLead">Lead / subtítulo *</label>
          <input type="text" id="fLead" placeholder="1-2 frases que resumem o post">
        </div>
        <div class="field form-full">
          <label for="fDesc">Descrição SEO *</label>
          <input type="text" id="fDesc" placeholder="Resumo para o Google — máx. 150 caracteres" maxlength="160">
          <span class="hint" id="descCount">0 / 150 caracteres</span>
        </div>
        <div class="field form-full">
          <label>Imagem de capa *</label>
          <div class="img-upload-area" id="imgArea">
            <div class="img-upload-placeholder">
              <svg class="img-upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <p class="img-upload-text"><strong>Clique para fazer upload</strong><br>WebP recomendado · 800×600px · máx. 200kb</p>

        <hr class="section-sep">
        <span class="section-label-row">Chamada para ação (CTA)</span>
        <div class="field">
          <label for="fCtaTitle">Título do CTA</label>

        <div class="field">
          <label for="fCtaText">Texto de apoio</label>

        <!-- SEO PANEL -->
        <div class="seo-panel" id="seoPanel">
          <div class="seo-panel-header">
            <div class="seo-score-ring">
              <svg width="64" height="64" viewBox="0 0 64 64">
                <circle class="ring-bg" cx="32" cy="32" r="27"/>
                <circle class="ring-fill" id="seoRingFill" cx="32" cy="32" r="27"
                  stroke-dasharray="169.6" stroke-dashoffset="169.6" stroke="#22c55e"/>
              </svg>
              <div class="seo-score-num" id="seoScoreNum">–</div>
            </div>
            <div class="seo-panel-info">
              <div class="seo-panel-title">Análise SEO</div>
              <div class="seo-panel-status" id="seoStatus">Defina a palavra-chave foco para começar.</div>
            </div>
          </div>
          <div class="seo-kw-row">
            <span class="seo-kw-label">Palavra-chave foco:</span>
            <input type="text" class="seo-kw-input" id="fKw" placeholder="Ex: varizes nas pernas">
          </div>
          <div class="seo-tabs">
            <button type="button" class="seo-tab active" data-tab="seo">SEO</button>
            <button type="button" class="seo-tab" data-tab="read">Legibilidade</button>
          </div>
          <div class="seo-tab-pane active" id="seoTabSeo">
            <div class="seo-items" id="seoItemsSeo"></div>
          </div>
          <div class="seo-tab-pane" id="seoTabRead">
            <div class="seo-items" id="seoItemsRead"></div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" id="btnCancel">Cancelar</button>
          <button type="button" class="btn-save" id="btnSave">Publicar post</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="loading-text" id="loadingText">Publicando post…</p>
</div>

<script>
(function () {
  var REPO   = 'Thielen-Szczypkowski-arch/site-drathielen-cc';
  var BRANCH = 'main';

  var token = sessionStorage.getItem('gh_token');
  if (!token) { window.location.href = '/admin/'; return; }

  var currentSlug    = null;
  var currentFileSha = null;
  var imgBase64      = null;
  var imgFileName    = null;
  var currentImgPath = null;
  var taxonomias     = { categorias: [], tags: [] };
  var selectedTags   = [];
  var taxFileSha     = null;

  // ── DOM refs ──
  var viewList   = document.getElementById('view-list');
  var viewEditor = document.getElementById('view-editor');
  var postsList  = document.getElementById('postsList');
  var postsCount = document.getElementById('postsCount');
  var editorTitle= document.getElementById('editorTitle');
  var richEditor = document.getElementById('richEditor');
  var imgArea    = document.getElementById('imgArea');
  var imgInput   = document.getElementById('imgInput');
  var descInput  = document.getElementById('fDesc');
  var descCount  = document.getElementById('descCount');
  var btnSave    = document.getElementById('btnSave');
  var toastEl    = document.getElementById('toast');
  var loadingEl  = document.getElementById('loadingOverlay');
  var loadingTxt = document.getElementById('loadingText');

  // ── Helpers ──
  function api(path, opts) {
    return fetch('https://api.github.com' + path, Object.assign({
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      }
    }, opts || {}));
  }

  function slugify(str) {
    return str.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9\s-]/g, '').trim()
      .replace(/\s+/g, '-').slice(0, 60);
  }

  function b64encode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

  function showToast(msg, isErr) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (isErr ? ' error' : '');
    setTimeout(function () { toastEl.className = 'toast'; }, 3500);
  }

  function setLoading(on, txt) {
    loadingEl.className = 'loading-overlay' + (on ? ' show' : '');
    if (txt) loadingTxt.textContent = txt;
  }

  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Rich editor ──
  function fmt(cmd) { richEditor.focus(); document.execCommand(cmd, false, null); }

  document.getElementById('btnBold').addEventListener('click',  function(){ fmt('bold'); });
  document.getElementById('btnItalic').addEventListener('click', function(){ fmt('italic'); });
  document.getElementById('btnH2').addEventListener('click',    function(){ richEditor.focus(); document.execCommand('formatBlock',false,'h2'); });
  document.getElementById('btnH3').addEventListener('click',    function(){ richEditor.focus(); document.execCommand('formatBlock',false,'h3'); });
  document.getElementById('btnList').addEventListener('click',  function(){ fmt('insertUnorderedList'); });
  document.getElementById('btnQuote').addEventListener('click', function(){ richEditor.focus(); document.execCommand('formatBlock',false,'blockquote'); });
  document.getElementById('btnClear').addEventListener('click', function(){ richEditor.focus(); document.execCommand('removeFormat',false,null); document.execCommand('formatBlock',false,'p'); });

  function getMarkdown() {
    var h = richEditor.innerHTML;
    return h
      .replace(/<h2[^>]*>(.*?)<\/h2>/gi,'\n## $1\n')
      .replace(/<h3[^>]*>(.*?)<\/h3>/gi,'\n### $1\n')
      .replace(/<blockquote[^>]*>([\s\S]*?)<\/blockquote>/gi, function(_,c){
        return '\n> ' + c.replace(/<[^>]+>/g,'').trim() + '\n';
      })
      .replace(/<strong[^>]*>(.*?)<\/strong>/gi,'**$1**')
      .replace(/<b[^>]*>(.*?)<\/b>/gi,'**$1**')
      .replace(/<em[^>]*>(.*?)<\/em>/gi,'*$1*')
      .replace(/<i[^>]*>(.*?)<\/i>/gi,'*$1*')
      .replace(/<li[^>]*>(.*?)<\/li>/gi,'- $1\n')
      .replace(/<ul[^>]*>|<\/ul>/gi,'\n')
      .replace(/<p[^>]*>(.*?)<\/p>/gi,'\n$1\n')
      .replace(/<br\s*\/?>/gi,'\n')
      .replace(/<[^>]+>/g,'')
      .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/&#160;/g,' ')
      .replace(/\n{3,}/g,'\n\n').trim();
  }

  function setEditorContent(md) {
    var html = md
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/^> (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/^- (.+)$/gm,'<li>$1</li>');
    richEditor.innerHTML = html;
  }

  // ── Upload de imagem ──
  imgArea.addEventListener('click', function () { imgInput.click(); });

  imgInput.addEventListener('change', function () {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      imgBase64    = ev.target.result.split(',')[1];
      imgFileName  = file.name.replace(/\s+/g,'-').toLowerCase();

      // Limpa a área e adiciona preview usando DOM (sem innerHTML de dados externos)
      while (imgArea.firstChild) imgArea.removeChild(imgArea.firstChild);
      imgArea.classList.add('has-image');

      var previewImg = document.createElement('img');
      previewImg.src       = ev.target.result;
      previewImg.alt       = 'Preview';
      previewImg.className = 'img-preview';

      var changeBtn = document.createElement('button');
      changeBtn.type      = 'button';
      changeBtn.className = 'img-change-btn';
      changeBtn.textContent = 'Trocar imagem';
      changeBtn.addEventListener('click', function(e){ e.stopPropagation(); imgInput.click(); });

      imgArea.appendChild(previewImg);
      imgArea.appendChild(changeBtn);

      document.getElementById('imgName').textContent = file.name + ' (' + (file.size/1024).toFixed(0) + ' kb)';
    };
    reader.readAsDataURL(file);
  });

  descInput.addEventListener('input', function () {
    descCount.textContent = this.value.length + ' / 150 caracteres';
  });

  // ── Taxonomias ──
  function loadTaxonomias() {
    return api('/repos/' + REPO + '/contents/_data/taxonomias.json?ref=' + BRANCH)
      .then(function(r){ return r.json(); })
      .then(function(data){
        taxFileSha = data.sha;
        taxonomias = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
        renderCatMenu();
        renderTagMenu();
      }).catch(function(){});
  }

  function saveTaxonomias() {
    var content = JSON.stringify(taxonomias, null, 2);
    var payload = { message: 'Atualiza taxonomias', content: b64encode(content), branch: BRANCH };
    if (taxFileSha) payload.sha = taxFileSha;
    return api('/repos/' + REPO + '/contents/_data/taxonomias.json', {
      method: 'PUT', body: JSON.stringify(payload)
    }).then(function(r){ return r.json(); }).then(function(d){ if (d.content) taxFileSha = d.content.sha; });
  }

  function renderCatMenu() {
    var menu = document.getElementById('catMenu');
    while (menu.firstChild) menu.removeChild(menu.firstChild);
    var current = document.getElementById('fCategory').value;
    taxonomias.categorias.forEach(function(cat){
      var item = document.createElement('div');
      item.className = 'tax-dropdown-item' + (cat === current ? ' selected' : '');
      item.textContent = cat;
      item.addEventListener('click', function(){
        document.getElementById('fCategory').value = cat;
        document.getElementById('catSelected').textContent = cat;
        document.getElementById('btnOpenCat').querySelector('svg').style.display = cat ? 'none' : '';
        renderCatMenu();
        document.getElementById('catMenu').classList.remove('open');
      });
      menu.appendChild(item);
    });
    // Nova categoria
    var newRow = document.createElement('div');
    newRow.className = 'tax-new-row';
    var inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'tax-new-input'; inp.placeholder = 'Nova categoria…';
    var btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'tax-new-btn'; btn.textContent = '+ Criar';
    btn.addEventListener('click', function(){
      var val = inp.value.trim();
      if (!val || taxonomias.categorias.indexOf(val) >= 0) return;
      taxonomias.categorias.push(val);
      saveTaxonomias();
      renderCatMenu();
      inp.value = '';
    });
    newRow.appendChild(inp); newRow.appendChild(btn);
    menu.appendChild(newRow);
  }

  function renderTagMenu() {
    var menu = document.getElementById('tagMenu');
    while (menu.firstChild) menu.removeChild(menu.firstChild);
    taxonomias.tags.forEach(function(tag){
      var item = document.createElement('div');
      var sel  = selectedTags.indexOf(tag) >= 0;
      item.className = 'tax-dropdown-item' + (sel ? ' selected' : '');
      item.textContent = tag;
      item.addEventListener('click', function(){
        var idx = selectedTags.indexOf(tag);
        if (idx >= 0) selectedTags.splice(idx, 1); else selectedTags.push(tag);
        renderTagMenu();
        renderSelectedTags();
      });
      menu.appendChild(item);
    });
    // Nova tag
    var newRow = document.createElement('div');
    newRow.className = 'tax-new-row';
    var inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'tax-new-input'; inp.placeholder = 'Nova tag…';
    var btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'tax-new-btn'; btn.textContent = '+ Criar';
    btn.addEventListener('click', function(){
      var val = inp.value.trim().toLowerCase();
      if (!val || taxonomias.tags.indexOf(val) >= 0) return;
      taxonomias.tags.push(val);
      selectedTags.push(val);
      saveTaxonomias();
      renderTagMenu();
      renderSelectedTags();
      inp.value = '';
    });
    newRow.appendChild(inp); newRow.appendChild(btn);
    menu.appendChild(newRow);
  }

  function renderSelectedTags() {
    var container = document.getElementById('tagsSelected');
    while (container.firstChild) container.removeChild(container.firstChild);
    selectedTags.forEach(function(tag){
      var chip = document.createElement('span');
      chip.className = 'tax-chip tag selected';
      chip.textContent = tag;
      var x = document.createElement('button');
      x.type = 'button'; x.textContent = '×';
      x.addEventListener('click', function(){
        var idx = selectedTags.indexOf(tag);
        if (idx >= 0) selectedTags.splice(idx, 1);
        renderSelectedTags();
        renderTagMenu();
      });
      chip.appendChild(x);
      container.appendChild(chip);
    });
  }

  // Fecha dropdowns ao clicar fora
  document.addEventListener('click', function(e){
    if (!document.getElementById('catDropdown').contains(e.target))
      document.getElementById('catMenu').classList.remove('open');
    if (!document.getElementById('tagDropdown').contains(e.target))
      document.getElementById('tagMenu').classList.remove('open');
  });

  document.getElementById('btnOpenCat').addEventListener('click', function(e){
    e.stopPropagation();
    document.getElementById('catMenu').classList.toggle('open');
    document.getElementById('tagMenu').classList.remove('open');
  });

  document.getElementById('btnOpenTag').addEventListener('click', function(e){
    e.stopPropagation();
    document.getElementById('tagMenu').classList.toggle('open');
    document.getElementById('catMenu').classList.remove('open');
  });

  // ── Navegação ──
  function showList() {
    viewList.style.display   = 'block';
    viewEditor.style.display = 'none';
    currentSlug = null; currentFileSha = null;
  }

  function showEditor(data) {
    viewList.style.display   = 'none';
    viewEditor.style.display = 'block';

    if (data) {
      editorTitle.textContent = 'Editar post';
      document.getElementById('fTitle').value    = data.title    || '';
      document.getElementById('fDate').value     = data.date     || '';
      document.getElementById('fCategory').value = data.category || '';
      document.getElementById('catSelected').textContent = data.category || '';
      document.getElementById('fLead').value     = data.lead     || '';
      descInput.value                            = data.description || '';
      document.getElementById('fImgAlt').value   = data.image_alt || '';
      document.getElementById('fKw').value       = data.focus_keyword || '';
      document.getElementById('fCtaTitle').value = data.cta_title || 'Quer avaliar seu caso?';
      document.getElementById('fCtaText').value  = data.cta_text  || '';
      descCount.textContent = (data.description || '').length + ' / 150 caracteres';
      setEditorContent(data.body || '');
      selectedTags = data.tags ? data.tags.split(',').map(function(t){ return t.trim(); }).filter(Boolean) : [];
      renderSelectedTags(); renderTagMenu(); renderCatMenu();
      currentSlug    = data.slug;
      currentFileSha = data.sha;

      // Carrega preview da imagem existente via URL pública
      resetImgArea();
      imgBase64 = null; imgFileName = null; currentImgPath = null;
      var existingImg = (data.image || '').replace(/^(\.\.\/)?assets\//, '');
      if (existingImg) {
        currentImgPath = existingImg;
        document.getElementById('imgName').textContent = existingImg;
        var publicUrl = 'https://www.drathielen.com.br/assets/' + existingImg;
        while (imgArea.firstChild) imgArea.removeChild(imgArea.firstChild);
        imgArea.classList.add('has-image');
        var previewImg = document.createElement('img');
        previewImg.src = publicUrl;
        previewImg.alt = 'Preview';
        previewImg.className = 'img-preview';
        previewImg.onerror = function() { resetImgArea(); currentImgPath = existingImg; document.getElementById('imgName').textContent = existingImg; };
        var changeBtn = document.createElement('button');
        changeBtn.type = 'button'; changeBtn.className = 'img-change-btn'; changeBtn.textContent = 'Trocar imagem';
        changeBtn.addEventListener('click', function(e){ e.stopPropagation(); imgInput.click(); });
        imgArea.appendChild(previewImg);
        imgArea.appendChild(changeBtn);
      }
    } else {
      editorTitle.textContent = 'Novo post';
      document.getElementById('fTitle').value    = '';
      document.getElementById('fDate').value     = new Date().toISOString().slice(0,10);
      document.getElementById('fCategory').value = '';
      document.getElementById('catSelected').textContent = '';
      document.getElementById('fLead').value     = '';
      descInput.value = '';
      document.getElementById('fImgAlt').value   = '';
      document.getElementById('fKw').value       = '';
      document.getElementById('fCtaTitle').value = 'Quer avaliar seu caso?';
      document.getElementById('fCtaText').value  = 'Agende uma avaliação vascular e descubra o melhor tratamento para você.';
      descCount.textContent = '0 / 150 caracteres';
      richEditor.innerHTML  = '';
      selectedTags = []; renderSelectedTags(); renderCatMenu(); renderTagMenu();
      resetImgArea();
      imgBase64 = null; imgFileName = null; currentImgPath = null;
      currentSlug = null; currentFileSha = null;
    }
    setTimeout(seoCheck, 50);
  }

  function resetImgArea() {
    while (imgArea.firstChild) imgArea.removeChild(imgArea.firstChild);
    imgArea.classList.remove('has-image');
    document.getElementById('imgName').textContent = '';

    var placeholder = document.createElement('div');
    placeholder.className = 'img-upload-placeholder';

    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','img-upload-icon');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','currentColor');
    svg.setAttribute('stroke-width','1.5');
    var path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z');
    svg.appendChild(path);

    var p = document.createElement('p');
    p.className = 'img-upload-text';
    var strong = document.createElement('strong');
    strong.textContent = 'Clique para fazer upload';
    p.appendChild(strong);
    p.appendChild(document.createElement('br'));
    p.appendChild(document.createTextNode('WebP recomendado · 800×600px · máx. 200kb'));

    placeholder.appendChild(svg);
    placeholder.appendChild(p);
    imgArea.appendChild(placeholder);
  }

  // ── Listar posts ──
  function loadPosts() {
    api('/repos/' + REPO + '/contents/_posts/blog?ref=' + BRANCH)
      .then(function (r) { return r.ok ? r.json() : []; })
      .then(function (files) {
        if (!Array.isArray(files)) { renderPosts([]); return; }
        var mds = files.filter(function(f){ return f.name.endsWith('.md'); });
        if (!mds.length) { renderPosts([]); return; }
        return Promise.all(mds.map(function (f) {
          return api('/repos/' + REPO + '/contents/' + f.path + '?ref=' + BRANCH)
            .then(function(r){ return r.json(); })
            .then(function(data){
              var raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
              var meta = parseFrontmatter(raw);
              meta.slug = f.name.replace('.md','');
              meta.sha  = data.sha;
              return meta;
            });
        }));
      })
      .then(function(posts){
        if (!posts) return;
        posts.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
        renderPosts(posts);
      })
      .catch(function(){ renderPosts([]); });
  }

  function parseFrontmatter(text) {
    var match = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)/);
    if (!match) return { body: text };
    var meta = {};
    match[1].split('\n').forEach(function(line){
      var i = line.indexOf(':');
      if (i < 0) return;
      var key = line.slice(0,i).trim();
      var val = line.slice(i+1).trim().replace(/^["']|["']$/g,'');
      meta[key] = val;
    });
    meta.body = match[2].trim();
    return meta;
  }

  function renderPosts(posts) {
    var count = posts.length;
    postsCount.textContent = count === 0
      ? 'Nenhum post publicado ainda.'
      : count + ' post' + (count !== 1 ? 's' : '') + ' publicado' + (count !== 1 ? 's' : '') + '.';

    while (postsList.firstChild) postsList.removeChild(postsList.firstChild);

    if (count === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      var ep = document.createElement('p');
      ep.textContent = 'Nenhum post ainda. Clique em "Novo post" para começar.';
      empty.appendChild(ep);
      postsList.appendChild(empty);
      return;
    }

    posts.forEach(function(p) {
      var dateStr = p.date
        ? new Date(p.date + 'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})
        : '';

      var item = document.createElement('div');
      item.className = 'post-item';

      var info = document.createElement('div');
      info.className = 'post-item-info';

      var titleEl = document.createElement('div');
      titleEl.className = 'post-item-title';
      titleEl.textContent = p.title || p.slug;

      var metaEl = document.createElement('div');
      metaEl.className = 'post-item-meta';
      metaEl.textContent = dateStr;

      var tag = document.createElement('span');
      tag.className = 'post-item-tag';
      tag.textContent = p.category || '';
      metaEl.appendChild(tag);

      info.appendChild(titleEl);
      info.appendChild(metaEl);

      var actions = document.createElement('div');
      actions.className = 'post-item-actions';

      var editBtn = document.createElement('button');
      editBtn.className = 'btn-edit';
      editBtn.textContent = 'Editar';
      editBtn.addEventListener('click', (function(slug, sha){ return function(){ editPost(slug, sha); }; })(p.slug, p.sha));

      var delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = 'Excluir';
      delBtn.addEventListener('click', (function(slug, sha){ return function(){ deletePost(slug, sha); }; })(p.slug, p.sha));

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      item.appendChild(info);
      item.appendChild(actions);
      postsList.appendChild(item);
    });
  }

  // ── Editar ──
  function editPost(slug, sha) {
    setLoading(true, 'Carregando post…');
    api('/repos/' + REPO + '/contents/_posts/blog/' + slug + '.md?ref=' + BRANCH)
      .then(function(r){ return r.json(); })
      .then(function(data){
        setLoading(false);
        var raw  = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
        var meta = parseFrontmatter(raw);
        meta.slug = slug;
        meta.sha  = data.sha;
        showEditor(meta);
      })
      .catch(function(){ setLoading(false); showToast('Erro ao carregar post.', true); });
  }

  // ── Excluir ──
  function deletePost(slug, sha) {
    if (!confirm('Excluir o post "' + slug + '"? Esta ação não pode ser desfeita.')) return;
    setLoading(true, 'Excluindo post…');
    api('/repos/' + REPO + '/contents/_posts/blog/' + slug + '.md', {
      method: 'DELETE',
      body: JSON.stringify({ message: 'Remove post: ' + slug, sha: sha, branch: BRANCH })
    }).then(function(r){
      setLoading(false);
      if (r.ok) { showToast('Post excluído.'); loadPosts(); }
      else { showToast('Erro ao excluir.', true); }
    }).catch(function(){ setLoading(false); showToast('Erro ao excluir.', true); });
  }

  // ── Salvar ──
  function savePost() {
    var title    = document.getElementById('fTitle').value.trim();
    var date     = document.getElementById('fDate').value;
    var category = document.getElementById('fCategory').value;
    var lead     = document.getElementById('fLead').value.trim();
    var desc     = descInput.value.trim();
    var imgAlt   = document.getElementById('fImgAlt').value.trim();
    var ctaTitle = document.getElementById('fCtaTitle').value.trim();
    var ctaText  = document.getElementById('fCtaText').value.trim();
    var body     = getMarkdown();

    if (!title || !date || !lead || !desc || !body) {
      showToast('Preencha todos os campos obrigatórios.', true); return;
    }

    var slug    = currentSlug || slugify(title);
    var imgPath = imgFileName ? 'assets/' + slug + '-' + imgFileName
               : (currentImgPath ? 'assets/' + currentImgPath : '');

    var kw = document.getElementById('fKw').value.trim();

    var fm = [
      '---',
      'title: "' + title.replace(/"/g,'\\"') + '"',
      'date: ' + date,
      'tags: "' + selectedTags.join(', ') + '"',
      'category: "' + category + '"',
      'lead: "' + lead.replace(/"/g,'\\"') + '"',
      'description: "' + desc.replace(/"/g,'\\"') + '"',
      'image: "' + imgPath + '"',
      'image_alt: "' + imgAlt.replace(/"/g,'\\"') + '"',
      'focus_keyword: "' + kw.replace(/"/g,'\\"') + '"',
      'cta_title: "' + ctaTitle.replace(/"/g,'\\"') + '"',
      'cta_text: "' + ctaText.replace(/"/g,'\\"') + '"',
      '---', '', body
    ].join('\n');

    btnSave.disabled = true;
    setLoading(true, 'Publicando post…');

    var chain = Promise.resolve();

    if (imgBase64 && imgFileName) {
      chain = chain.then(function(){
        return api('/repos/' + REPO + '/contents/' + imgPath, {
          method: 'PUT',
          body: JSON.stringify({ message: 'Upload imagem: ' + imgPath, content: imgBase64, branch: BRANCH })
        }).then(function(r){ if (!r.ok) return r.json().then(function(d){ throw new Error(d.message); }); });
      });
    }

    chain = chain.then(function(){
      var payload = { message: (currentFileSha ? 'Atualiza' : 'Publica') + ' post: ' + slug, content: b64encode(fm), branch: BRANCH };
      if (currentFileSha) payload.sha = currentFileSha;
      return api('/repos/' + REPO + '/contents/_posts/blog/' + slug + '.md', {
        method: 'PUT',
        body: JSON.stringify(payload)
      }).then(function(r){ if (!r.ok) return r.json().then(function(d){ throw new Error(d.message); }); });
    });

    chain.then(function(){
      setLoading(false);
      btnSave.disabled = false;
      showToast('Post publicado! O site será atualizado em ~1 minuto.');
      imgBase64 = null; imgFileName = null;
      setTimeout(function(){ showList(); loadPosts(); }, 1500);
    }).catch(function(err){
      setLoading(false);
      btnSave.disabled = false;
      showToast('Erro: ' + err.message, true);
    });
  }

  // ── SEO Analysis (Yoast-aligned) ──

  // Abas SEO / Legibilidade
  document.querySelectorAll('.seo-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.seo-tab').forEach(function(t){ t.classList.remove('active'); });
      document.querySelectorAll('.seo-tab-pane').forEach(function(p){ p.classList.remove('active'); });
      tab.classList.add('active');
      document.getElementById('seoTab' + (tab.dataset.tab === 'seo' ? 'Seo' : 'Read')).classList.add('active');
    });
  });

  function plainText(html) {
    var d = document.createElement('div');
    d.innerHTML = html;
    return (d.textContent || d.innerText || '').replace(/\s+/g,' ').trim();
  }

  function countWords(text) {
    return text.trim().split(/\s+/).filter(function(w){ return w.length > 0; }).length;
  }

  function kwDensity(text, kw) {
    if (!kw || !text) return 0;
    var words = text.toLowerCase().split(/\s+/).filter(function(w){ return w.length > 0; });
    if (!words.length) return 0;
    var kwWords = kw.toLowerCase().split(/\s+/);
    var count = 0;
    for (var i = 0; i <= words.length - kwWords.length; i++) {
      var match = true;
      for (var j = 0; j < kwWords.length; j++) {
        if (words[i+j].replace(/[^a-záéíóúãõàêôü]/g,'') !== kwWords[j].replace(/[^a-záéíóúãõàêôü]/g,'')) { match = false; break; }
      }
      if (match) count++;
    }
    return (count / words.length) * 100;
  }

  function getSentences(text) {
    return text.split(/[.!?]+/).map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });
  }

  function getParagraphs(html) {
    var d = document.createElement('div');
    d.innerHTML = html;
    var paras = [];
    d.querySelectorAll('p, h2, h3, li, blockquote').forEach(function(el){
      var t = (el.textContent || '').trim();
      if (t) paras.push(t);
    });
    if (!paras.length && d.textContent.trim()) paras.push(d.textContent.trim());
    return paras;
  }

  function hasTransitionWords(text) {
    var tw = ['portanto','além disso','no entanto','por isso','assim','também','contudo','todavia','porém','embora','pois','logo','então','consequentemente','finalmente','em seguida','de fato','por exemplo','ou seja','em resumo','primeiro','segundo','terceiro','por outro lado','ao mesmo tempo','dessa forma'];
    var lower = text.toLowerCase();
    return tw.some(function(w){ return lower.indexOf(w) >= 0; });
  }

  function makeItem(status, title, desc) {
    return { ok: status, title: title, desc: desc };
  }

  function renderItems(containerId, items) {
    var container = document.getElementById(containerId);
    while (container.firstChild) container.removeChild(container.firstChild);
    items.forEach(function(c){
      var item = document.createElement('div');
      item.className = 'seo-item ' + c.ok;
      var dot = document.createElement('span');
      dot.className = 'seo-item-dot';
      var body = document.createElement('div');
      body.className = 'seo-item-body';
      var t = document.createElement('div');
      t.className = 'seo-item-title';
      t.textContent = c.title;
      body.appendChild(t);
      if (c.desc) {
        var d = document.createElement('div');
        d.className = 'seo-item-desc';
        d.textContent = c.desc;
        body.appendChild(d);
      }
      item.appendChild(dot);
      item.appendChild(body);
      container.appendChild(item);
    });
  }

  function seoCheck() {
    var title    = document.getElementById('fTitle').value.trim();
    var desc     = descInput.value.trim();
    var lead     = document.getElementById('fLead').value.trim();
    var imgAlt   = document.getElementById('fImgAlt').value.trim();
    var kw       = (document.getElementById('fKw').value || '').trim().toLowerCase();
    var bodyHtml = richEditor.innerHTML;
    var bodyText = plainText(bodyHtml);
    var hasImg   = !!imgBase64 || !!currentImgPath || (document.getElementById('imgName').textContent.trim() !== '');
    var slug     = currentSlug || slugify(title);

    var titleLen  = title.length;
    var descLen   = desc.length;
    var wordCount = countWords(bodyText);
    var titleLow  = title.toLowerCase();
    var descLow   = desc.toLowerCase();
    var leadLow   = lead.toLowerCase();
    var altLow    = imgAlt.toLowerCase();

    // ── Aba SEO ──
    var seoItems = [];

    // 1. Palavra-chave foco
    if (!kw) {
      seoItems.push(makeItem('warn','Palavra-chave foco não definida','Informe a palavra-chave principal do post no campo acima.'));
    }

    // 2. Palavra-chave no título SEO
    if (kw) {
      if (titleLow.indexOf(kw) >= 0)
        seoItems.push(makeItem('ok','Palavra-chave no título','A palavra-chave aparece no título do post.'));
      else
        seoItems.push(makeItem('bad','Palavra-chave ausente no título','Inclua "' + kw + '" no título do post.'));
    }

    // 3. Palavra-chave na descrição SEO
    if (kw) {
      if (descLow.indexOf(kw) >= 0)
        seoItems.push(makeItem('ok','Palavra-chave na descrição SEO','A palavra-chave aparece na meta descrição.'));
      else
        seoItems.push(makeItem('bad','Palavra-chave ausente na descrição SEO','Inclua "' + kw + '" na descrição SEO.'));
    }

    // 4. Palavra-chave no lead (introdução)
    if (kw) {
      if (leadLow.indexOf(kw) >= 0)
        seoItems.push(makeItem('ok','Palavra-chave no lead','A palavra-chave aparece nos primeiros parágrafos.'));
      else
        seoItems.push(makeItem('warn','Palavra-chave ausente no lead','O Yoast recomenda usar a palavra-chave na introdução do post.'));
    }

    // 5. Palavra-chave no corpo
    if (kw) {
      if (bodyText.toLowerCase().indexOf(kw) >= 0)
        seoItems.push(makeItem('ok','Palavra-chave no corpo do post','A palavra-chave aparece no conteúdo.'));
      else
        seoItems.push(makeItem('bad','Palavra-chave ausente no corpo','Mencione "' + kw + '" ao longo do texto.'));
    }

    // 6. Densidade da palavra-chave (0.5% – 3%)
    if (kw && wordCount > 0) {
      var density = kwDensity(bodyText + ' ' + title + ' ' + lead, kw);
      var densityStr = density.toFixed(1) + '%';
      if (density >= 0.5 && density <= 3)
        seoItems.push(makeItem('ok','Densidade da palavra-chave: ' + densityStr,'Dentro do ideal (0,5%–3%).'));
      else if (density > 3)
        seoItems.push(makeItem('warn','Densidade alta: ' + densityStr,'Acima de 3% pode parecer spam para o Google. Reduza um pouco.'));
      else
        seoItems.push(makeItem('warn','Densidade baixa: ' + densityStr,'Abaixo de 0,5%. Use a palavra-chave um pouco mais no texto.'));
    }

    // 7. Palavra-chave em subtítulo H2/H3
    if (kw) {
      var d2 = document.createElement('div');
      d2.innerHTML = bodyHtml;
      var headings = d2.querySelectorAll('h2, h3');
      var kwInH = false;
      headings.forEach(function(h){ if ((h.textContent||'').toLowerCase().indexOf(kw) >= 0) kwInH = true; });
      if (headings.length === 0)
        seoItems.push(makeItem('warn','Nenhum subtítulo (H2/H3)','Use subtítulos para organizar o conteúdo e incluir a palavra-chave.'));
      else if (kwInH)
        seoItems.push(makeItem('ok','Palavra-chave em subtítulo','A palavra-chave aparece em pelo menos um H2 ou H3.'));
      else
        seoItems.push(makeItem('warn','Palavra-chave ausente nos subtítulos','Tente incluir "' + kw + '" em algum H2 ou H3.'));
    }

    // 8. Alt da imagem contém palavra-chave
    if (kw) {
      if (!imgAlt)
        seoItems.push(makeItem('bad','Alt da imagem vazio','Preencha o texto alternativo da imagem de capa.'));
      else if (altLow.indexOf(kw) >= 0)
        seoItems.push(makeItem('ok','Palavra-chave no alt da imagem','O texto alt contém a palavra-chave.'));
      else
        seoItems.push(makeItem('warn','Palavra-chave ausente no alt da imagem','Considere incluir "' + kw + '" no alt da imagem.'));
    } else if (!imgAlt) {
      seoItems.push(makeItem('bad','Alt da imagem vazio','Preencha o texto alternativo da imagem de capa.'));
    }

    // 9. Slug contém palavra-chave
    if (kw && slug) {
      var slugNorm = slug.toLowerCase();
      var kwSlug   = kw.replace(/\s+/g,'-');
      if (slugNorm.indexOf(kwSlug) >= 0 || slugNorm.indexOf(kw.replace(/\s+/g,'')) >= 0)
        seoItems.push(makeItem('ok','Palavra-chave no slug (URL)','O endereço do post contém a palavra-chave.'));
      else
        seoItems.push(makeItem('warn','Palavra-chave ausente no slug','O título gera o slug automaticamente — tente incluir a palavra-chave no título.'));
    }

    // 10. Tamanho do título (máx. 60 chars)
    if (titleLen === 0)
      seoItems.push(makeItem('bad','Título vazio','Preencha o título do post.'));
    else if (titleLen <= 60)
      seoItems.push(makeItem('ok','Título: ' + titleLen + ' caracteres','Dentro do limite de 60 caracteres recomendado pelo Google.'));
    else
      seoItems.push(makeItem('warn','Título longo: ' + titleLen + ' caracteres','O Google pode cortar títulos acima de 60 caracteres nos resultados.'));

    // 11. Tamanho da descrição SEO (120–155 chars)
    if (descLen === 0)
      seoItems.push(makeItem('bad','Descrição SEO vazia','Preencha a meta descrição para aparecer no Google.'));
    else if (descLen >= 120 && descLen <= 155)
      seoItems.push(makeItem('ok','Descrição SEO: ' + descLen + ' caracteres','Dentro do ideal (120–155 caracteres).'));
    else if (descLen < 120)
      seoItems.push(makeItem('warn','Descrição curta: ' + descLen + ' caracteres','O ideal é entre 120 e 155 caracteres. Adicione mais detalhes.'));
    else
      seoItems.push(makeItem('warn','Descrição longa: ' + descLen + ' caracteres','Acima de 155 pode ser cortada no Google. Reduza um pouco.'));

    // 12. Comprimento do post
    if (wordCount >= 300)
      seoItems.push(makeItem('ok','Texto: ' + wordCount + ' palavras','Bom comprimento para SEO (mínimo 300 palavras).'));
    else if (wordCount >= 150)
      seoItems.push(makeItem('warn','Texto curto: ' + wordCount + ' palavras','O Yoast recomenda pelo menos 300 palavras para posts de blog.'));
    else
      seoItems.push(makeItem('bad','Texto muito curto: ' + wordCount + ' palavras','Posts com menos de 150 palavras têm dificuldade de ranquear.'));

    // 13. Imagem de capa
    if (hasImg)
      seoItems.push(makeItem('ok','Imagem de capa presente','O post tem imagem de destaque.'));
    else
      seoItems.push(makeItem('bad','Imagem de capa ausente','Adicione uma imagem de capa ao post.'));

    // 14. Links internos
    var d4 = document.createElement('div');
    d4.innerHTML = bodyHtml;
    var allLinks = d4.querySelectorAll('a[href]');
    var internalLinks = 0, externalLinks = 0;
    allLinks.forEach(function(a){
      var href = a.getAttribute('href') || '';
      if (href.indexOf('drathielen.com.br') >= 0 || (href.indexOf('http') < 0 && href.length > 1))
        internalLinks++;
      else if (href.indexOf('http') === 0)
        externalLinks++;
    });
    if (internalLinks >= 1)
      seoItems.push(makeItem('ok','Links internos: ' + internalLinks,'O post contém links para outras páginas do site.'));
    else
      seoItems.push(makeItem('warn','Sem links internos','Adicione links para outras páginas do site (ex: outros posts ou página de tratamentos).'));

    // 15. Links externos
    if (externalLinks >= 1)
      seoItems.push(makeItem('ok','Links externos: ' + externalLinks,'O post cita fontes externas confiáveis.'));
    else
      seoItems.push(makeItem('warn','Sem links externos','Considere citar pelo menos uma fonte externa confiável (ex: artigo científico, CFM).'));

    // 16. H1 único — título do post é o H1; verificar se há H1 manual no corpo
    var d5 = document.createElement('div');
    d5.innerHTML = bodyHtml;
    var h1sInBody = d5.querySelectorAll('h1');
    if (h1sInBody.length > 0)
      seoItems.push(makeItem('warn','H1 no corpo do post','O H1 já é o título do post. Remova os H1 do corpo e use H2/H3.'));
    else
      seoItems.push(makeItem('ok','H1 único','O título do post é o único H1 da página. Correto.'));

    // ── Aba Legibilidade ──
    var readItems = [];
    var sentences = getSentences(bodyText);
    var paragraphs = getParagraphs(bodyHtml);

    // Frases longas (> 20 palavras)
    if (sentences.length > 0) {
      var longSentences = sentences.filter(function(s){ return countWords(s) > 20; });
      var pctLong = Math.round((longSentences.length / sentences.length) * 100);
      if (pctLong <= 25)
        readItems.push(makeItem('ok','Comprimento das frases','Menos de 25% das frases são longas demais. Boa legibilidade.'));
      else if (pctLong <= 50)
        readItems.push(makeItem('warn', pctLong + '% das frases são longas','O Yoast recomenda máx. 25% de frases acima de 20 palavras. Tente dividir algumas.'));
      else
        readItems.push(makeItem('bad', pctLong + '% das frases são muito longas','Divida as frases longas. Frases curtas são mais fáceis de ler.'));
    }

    // Parágrafos longos (> 150 palavras)
    if (paragraphs.length > 0) {
      var longParas = paragraphs.filter(function(p){ return countWords(p) > 150; });
      if (longParas.length === 0)
        readItems.push(makeItem('ok','Parágrafos com tamanho adequado','Nenhum parágrafo ultrapassa 150 palavras.'));
      else
        readItems.push(makeItem('warn', longParas.length + ' parágrafo(s) muito longo(s)','Divida parágrafos com mais de 150 palavras para facilitar a leitura.'));
    }

    // Subtítulos (H2/H3) — presença e distribuição
    var d3 = document.createElement('div');
    d3.innerHTML = bodyHtml;
    var allHeadings = d3.querySelectorAll('h2, h3');
    if (allHeadings.length === 0 && wordCount > 150)
      readItems.push(makeItem('bad','Sem subtítulos','Use H2 e H3 para dividir o conteúdo em seções — facilita a leitura e o SEO.'));
    else if (allHeadings.length >= 1)
      readItems.push(makeItem('ok', allHeadings.length + ' subtítulo(s) encontrado(s)','O conteúdo está dividido em seções. Boa estrutura.'));

    // Palavras de transição — Yoast: mín. 30% das frases
    if (sentences.length >= 4) {
      var tw = ['portanto','além disso','no entanto','por isso','assim','também','contudo','todavia','porém','embora','pois','logo','então','consequentemente','finalmente','em seguida','de fato','por exemplo','ou seja','em resumo','primeiro','segundo','terceiro','por outro lado','ao mesmo tempo','dessa forma','além disso','visto que','uma vez que','apesar de','mesmo assim','por fim','em primeiro lugar','em segundo lugar','sobretudo','especialmente','inclusive','acima de tudo','nesse sentido','com isso','diante disso'];
      var sentWithTw = sentences.filter(function(s){
        var sl = s.toLowerCase();
        return tw.some(function(w){ return sl.indexOf(w) >= 0; });
      }).length;
      var pctTw = Math.round((sentWithTw / sentences.length) * 100);
      if (pctTw >= 30)
        readItems.push(makeItem('ok','Palavras de transição: ' + pctTw + '% das frases','Ótimo uso de conectivos. O texto flui bem.'));
      else if (pctTw >= 20)
        readItems.push(makeItem('warn','Palavras de transição: ' + pctTw + '% das frases','O Yoast recomenda ao menos 30%. Use mais conectivos como "portanto", "além disso", "por isso".'));
      else
        readItems.push(makeItem('bad','Palavras de transição: ' + pctTw + '% das frases','Muito abaixo do ideal (30%). Adicione conectivos para ligar as ideias do texto.'));
    }

    // Voz passiva — Yoast: máx. 10% das frases
    if (sentences.length >= 4) {
      var passivePatterns = ['é feito','são feitos','foi feito','foram feitos','é realizado','são realizados','é indicado','é recomendado','é utilizado','é usado','é causado','são causados','é tratado','são tratados','é considerado','são considerados','é chamado','é conhecido','é dado','é aplicado','foi aplicado','são aplicados'];
      var passiveSents = sentences.filter(function(s){
        var sl = s.toLowerCase();
        return passivePatterns.some(function(p){ return sl.indexOf(p) >= 0; });
      }).length;
      var pctPassive = Math.round((passiveSents / sentences.length) * 100);
      if (pctPassive <= 10)
        readItems.push(makeItem('ok','Voz passiva: ' + pctPassive + '% das frases','Dentro do ideal (máx. 10%). Texto ativo e dinâmico.'));
      else if (pctPassive <= 15)
        readItems.push(makeItem('warn','Voz passiva: ' + pctPassive + '% das frases','Um pouco acima do ideal (10%). Tente usar mais voz ativa.'));
      else
        readItems.push(makeItem('bad','Voz passiva: ' + pctPassive + '% das frases','Acima de 15%. Use voz ativa: "a médica recomenda" em vez de "é recomendado".'));
    }

    // Sentenças consecutivas com mesmo início — Yoast: alerta se 3+
    if (sentences.length >= 3) {
      var hasConsec = false;
      for (var ci = 0; ci <= sentences.length - 3; ci++) {
        var w1 = sentences[ci].split(/\s+/)[0] || '';
        var w2 = sentences[ci+1].split(/\s+/)[0] || '';
        var w3 = sentences[ci+2].split(/\s+/)[0] || '';
        if (w1.length > 2 && w1.toLowerCase() === w2.toLowerCase() && w1.toLowerCase() === w3.toLowerCase()) {
          hasConsec = true; break;
        }
      }
      if (hasConsec)
        readItems.push(makeItem('warn','Frases consecutivas com mesmo início','3 ou mais frases seguidas começam com a mesma palavra. Varie o início das frases.'));
      else
        readItems.push(makeItem('ok','Variedade no início das frases','Nenhuma sequência de 3 frases começa com a mesma palavra.'));
    }

    // Uso de listas
    var d6 = document.createElement('div');
    d6.innerHTML = bodyHtml;
    var listsInBody = d6.querySelectorAll('ul, ol');
    if (listsInBody.length >= 1)
      readItems.push(makeItem('ok','Listas presentes','O post usa listas, facilitando a leitura.'));
    else if (wordCount >= 300)
      readItems.push(makeItem('warn','Sem listas','Considere usar listas para organizar informações em tópicos — melhora a legibilidade.'));

    // Comprimento do lead
    if (lead.length === 0)
      readItems.push(makeItem('bad','Lead vazio','Preencha o lead com 1–2 frases que resumem o post.'));
    else if (lead.length <= 160)
      readItems.push(makeItem('ok','Lead com bom comprimento','Conciso e direto ao ponto.'));
    else
      readItems.push(makeItem('warn','Lead muito longo','Tente manter o lead em até 160 caracteres.'));

    // ── Score combinado ──
    var allItems = seoItems.concat(readItems);
    var okCount   = allItems.filter(function(c){ return c.ok === 'ok'; }).length;
    var warnCount = allItems.filter(function(c){ return c.ok === 'warn'; }).length;
    var score = allItems.length > 0 ? Math.round((okCount + warnCount * 0.5) / allItems.length * 100) : 0;

    var circumference = 169.6;
    var offset = circumference - (score / 100) * circumference;
    var fill = document.getElementById('seoRingFill');
    fill.style.strokeDashoffset = offset;
    fill.style.stroke = score >= 75 ? '#22c55e' : score >= 45 ? '#eab308' : '#ef4444';
    document.getElementById('seoScoreNum').textContent = score + '%';
    document.getElementById('seoStatus').textContent = score >= 75
      ? 'Ótimo! Post bem otimizado.'
      : score >= 45 ? 'Bom, mas há pontos a melhorar.'
      : kw ? 'Precisa de ajustes antes de publicar.' : 'Defina a palavra-chave foco para começar.';

    renderItems('seoItemsSeo',  seoItems);
    renderItems('seoItemsRead', readItems);
  }

  // Triggers
  ['fTitle','fDesc','fLead','fImgAlt','fKw'].forEach(function(id){
    document.getElementById(id).addEventListener('input', seoCheck);
  });
  richEditor.addEventListener('input', seoCheck);
  imgInput.addEventListener('change', function(){ setTimeout(seoCheck, 100); });

  // ── Event listeners ──
  document.getElementById('btnNewPost').addEventListener('click', function(){ showEditor(null); });
  document.getElementById('btnBackList').addEventListener('click', showList);
  document.getElementById('btnCancel').addEventListener('click', showList);
  document.getElementById('btnSave').addEventListener('click', savePost);
  document.getElementById('btnLogout').addEventListener('click', function(){
    sessionStorage.removeItem('gh_token');
    window.location.href = '/admin/';
  });

  // ── Init ──
  loadTaxonomias();
  loadPosts();
})();
</script>
</body>
</html>
