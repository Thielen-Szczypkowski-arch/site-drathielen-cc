name: Build Blog Posts

on:
  push:
    paths:
      - '_posts/blog/**.md'
      - '_scripts/build-posts.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml markdown -q

      - name: Build posts
        run: python _scripts/build-posts.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --cached --quiet || git commit -m "Build: atualiza posts gerados pelo CMS"
          git push
