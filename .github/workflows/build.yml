name: Build Blog Posts

on:
  push:
    paths:
      - '_posts/blog/**.md'
      - '_scripts/build-posts.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml markdown -q

      - name: Build posts
        run: python _scripts/build-posts.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/ index.html sitemap.xml
          if git diff --cached --quiet; then
            echo "Sem alterações para commitar"
            exit 0
          fi
          git commit -m "Build: atualiza posts gerados pelo CMS"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push && exit 0
            sleep 5
          done
          exit 1
